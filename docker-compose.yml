version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend/data:/app/data
      - ./backend/.env:/app/.env
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DB_PATH=/app/data/interview_ai.db

volumes:
  backend_data:
